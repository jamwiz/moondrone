workflows:
  ios-moondrone-unsigned:
    name: Moondrone iOS Unsigned Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/App/Pods

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Build unsigned iOS app
        script: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*

  ios-moondrone-testflight:
    name: Moondrone iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: "codemagic moondrone"

    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moondrone.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.moondrone.app

    cache:
      cache_paths:
        - ~/.npm
        - node_modules

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build signed IPA for TestFlight
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
