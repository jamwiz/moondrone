workflows:
  ios-moondrone-unsigned:
    name: Moondrone iOS Unsigned Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.npm
        - node_modules
        - ios/App/Pods

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Build unsigned iOS app
        script: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*

  ios-moondrone-testflight:
    name: Moondrone iOS TestFlight Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: "codemagic moondrone"

    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.moondrone.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.moondrone.app

    cache:
      cache_paths:
        - ~/.npm
        - node_modules

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Set iOS build number from Codemagic
        script: |
          cd ios/App
          # CFBundleVersion / CURRENT_PROJECT_VERSION — must increase for each TestFlight upload.
          # BUILD_NUMBER is Codemagic's per-workflow counter; floor at 2 because build 1 is already uploaded.
          IOS_BUILD_NUMBER=$((BUILD_NUMBER < 2 ? 2 : BUILD_NUMBER))
          agvtool new-marketing-version 1.0
          agvtool new-version -all "$IOS_BUILD_NUMBER"
          echo "Set MARKETING_VERSION=1.0 CURRENT_PROJECT_VERSION=$IOS_BUILD_NUMBER (Codemagic BUILD_NUMBER=$BUILD_NUMBER)"
          agvtool what-version -terse

      - name: Build signed IPA for TestFlight
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
